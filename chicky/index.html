
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>Chicky Fried Chicken | Egypt's #1</title>
    <link rel="shortcut icon" type="image/png" href="https://raw.githubusercontent.com/ai-studio-assets/chicky-logo/main/logo-red.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&family=Cairo:wght@400;700;900&family=Changa:wght@400;700;800;900&display=swap" rel="stylesheet">
    <!-- Leaflet Map Assets -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
      :root {
        --brand-red: #E4002B;
        --brand-dark: #0A0A0A;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #fcfcfc;
        -webkit-tap-highlight-color: transparent;
      }
      .brand-font {
        font-family: 'Bebas Neue', cursive;
        letter-spacing: 0.02em;
      }
      .font-arabic {
        font-family: 'Cairo', sans-serif;
      }
      
      .bg-stripes {
        background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0, rgba(255,255,255,0.05) 10px, transparent 10px, transparent 20px);
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-15px); }
      }
      @keyframes reveal {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .animate-float { animation: float 5s ease-in-out infinite; }
      .animate-reveal { animation: reveal 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
      
      

      .glass {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      .hover-lift {
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
      }
      .hover-lift:hover {
        transform: translateY(-5px) scale(1.02);
        box-shadow: 0 20px 40px -10px rgba(228, 0, 43, 0.2);
      }

      /* Leaflet Custom UI Fixes */
      .leaflet-container {
        width: 100%;
        height: 100%;
        z-index: 10;
      }
      .leaflet-control-attribution { display: none !important; }

      /* Cursor Force for Drawing Mode */
      .cursor-none .leaflet-container {
        cursor: none !important;
      }
      .cursor-none .leaflet-interactive {
        cursor: none !important;
      }
    </style>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body class="selection:bg-red-600 selection:text-white">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
